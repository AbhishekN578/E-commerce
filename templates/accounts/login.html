{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center mt-5 mb-5">
    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 350px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold fs-3">Sign-In</h2>
        </div>
        
        {% if error %}
            <div class="alert alert-danger p-2 small">
                <i class="bi bi-exclamation-triangle-fill text-danger me-1"></i>
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="email" class="form-label fw-bold small mb-1">Email or mobile phone number</label>
                <input type="email" class="form-control" id="email" name="email" required autofocus>
            </div>
            
            <div class="mb-3">
                <div class="d-flex justify-content-between mb-1">
                    <label for="password" class="form-label fw-bold small mb-0">Password</label>
                    <a href="#" class="small text-decoration-none">Forgot Password</a>
                </div>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-warning w-100 mb-3">Sign in</button>
            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="keep_signed_in" checked>
                <label class="form-check-label small" for="keep_signed_in">Keep me signed in.</label>
            </div>
        </form>

        <div class="position-relative text-center my-3">
            <hr class="text-muted">
            <span class="position-absolute top-50 start-50 translate-middle px-2 bg-white text-muted small" style="z-index: 1;">New to AmazonClone?</span>
        </div>
        
        <a href="/accounts/register/" class="btn btn-secondary-action w-100">Create your Amazon account</a>
    </div>
</div>
{% endblock %}
